<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <pattern id="lc-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#64748B" />
    </marker>
    <marker id="arrow-success" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#10B981" />
    </marker>
    <marker id="arrow-danger" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#EF4444" />
    </marker>
    <marker id="arrow-rebuild" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#38BDF8" />
    </marker>
  </defs>
  <rect width="1280" height="320" fill="#0F172A" />
  <rect width="1280" height="320" fill="url(#lc-grid)" />
  <text x="80" y="50" fill="#94A3B8" font-size="12" font-family="system-ui, -apple-system, sans-serif" font-weight="700" letter-spacing="1">OPERATOR LIFECYCLE</text>
  <path d="M 220 110 L 290 110" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-success)" />
  <path d="M 440 110 L 510 110" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-neutral)" />
  <path d="M 660 110 L 730 110" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-neutral)" />
  <path d="M 370 140 L 370 200 L 510 200" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrow-neutral)" stroke-linejoin="round" />
  <path d="M 660 200 L 730 200" stroke="#EF4444" stroke-width="2" marker-end="url(#arrow-danger)" />
  <path d="M 880 200 L 950 200" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrow-rebuild)" />
  <path d="M 1020 170 L 1020 60 L 370 60 L 370 80" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-success)" stroke-linejoin="round" />
  <g transform="translate(80, 80)">
    <rect width="140" height="60" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" />
    <rect width="6" height="60" fill="#38BDF8" rx="3" />
    <text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Bootstrap</text>
  </g>
  <g transform="translate(300, 80)">
    <rect width="140" height="60" fill="#1E293B" stroke="#10B981" stroke-width="1" rx="8" />
    <rect width="6" height="60" fill="#10B981" rx="3" />
    <text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Healthy</text>
  </g>
  <g transform="translate(520, 80)">
    <rect width="140" height="60" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" />
    <rect width="6" height="60" fill="#F59E0B" rx="3" />
    <text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Backup</text>
  </g>
  <g transform="translate(740, 80)">
    <rect width="140" height="60" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" stroke-dasharray="4,4" />
    <rect width="6" height="60" fill="#F97316" rx="3" />
    <text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Restore</text>
  </g>
  <g transform="translate(520, 170)">
    <rect width="140" height="60" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" />
    <rect width="6" height="60" fill="#F97316" rx="3" />
    <text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Diagnose</text>
  </g>
  <g transform="translate(740, 170)">
    <rect width="140" height="60" fill="#1E293B" stroke="#EF4444" stroke-width="1" rx="8" stroke-dasharray="4,4" />
    <rect width="6" height="60" fill="#EF4444" rx="3" />
    <text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Reset</text>
  </g>
  <g transform="translate(950, 170)">
    <rect width="140" height="60" fill="#1E293B" stroke="#334155" stroke-width="1" rx="8" />
    <rect width="6" height="60" fill="#38BDF8" rx="3" />
    <text x="70" y="35" fill="#F8FAFC" font-size="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" text-anchor="middle">Rebuild</text>
  </g>
</svg>
