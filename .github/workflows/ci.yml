name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Shell and compose lint
        run: bash ./scripts/lint.sh

  integration:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          cp .env.example .env

      - name: Validate compose file
        run: docker compose config -q

      - name: Bootstrap stack
        run: bash ./scripts/bootstrap.sh

      - name: Smoke tests
        run: bash ./scripts/smoke-test.sh

      - name: Health summary
        run: bash ./scripts/healthcheck.sh

      - name: Backup and restore validation
        run: bash ./scripts/test-backup-restore.sh

      - name: Log summary snapshot
        run: bash ./scripts/log-summary.sh --tail 30 --since 10m

      - name: Reset environment
        if: always()
        run: bash ./scripts/reset-env.sh --force --preserve-env
