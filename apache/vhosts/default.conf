<VirtualHost *:80>
    ServerName localhost

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyAddHeaders On
    ProxyTimeout 15
    RequestHeader set X-Forwarded-Proto "http"

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    RedirectMatch 301 ^/node$ /node/
    RedirectMatch 301 ^/php$ /php/

    ProxyPass /node/ http://node-demo:3006/
    ProxyPassReverse /node/ http://node-demo:3006/

    ProxyPass /php/ http://php-demo:8000/
    ProxyPassReverse /php/ http://php-demo:8000/

    ProxyPass /healthz http://node-demo:3006/health
    ProxyPassReverse /healthz http://node-demo:3006/health

    <Location /server-status>
        SetHandler server-status
        Require all granted
    </Location>
</VirtualHost>
